<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin | Listado de Citas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #e9f0fc 0%, #ffffff 100%);
      min-height: 100vh;
      padding: 0rem;
    }

    .citas-container {
      max-width: 1600px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 0rem;
      overflow: hidden;
    }

    .citas-header {
      background: #1f4870;
      padding: 1.5rem 2rem;
      color: white;
    }

    .citas-header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .citas-body {
      padding: 2rem;
    }

    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .titulo-pagina {
      color: #1f4870;
      font-size: 1.4rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .stats-summary {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .stat-badge {
      background: white;
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      border: 1px solid #eef2f8;
      font-size: 0.8rem;
    }

    .stat-badge strong {
      color: #1f4870;
      font-size: 1.2rem;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 1.2rem;
      border: 1px solid #eef2f8;
      background: white;
    }

    .tabla-citas {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .tabla-citas thead tr {
      background: #1f4870;
      color: white;
    }

    .tabla-citas th,
    .tabla-citas td {
      padding: 1rem 0.8rem;
      text-align: left;
      border-bottom: 1px solid #eef2f8;
    }

    .tabla-citas tbody tr:hover {
      background: #f8fafd;
    }

    .badge-estado {
      display: inline-block;
      padding: 0.25rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .badge-pendiente {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge-confirmada {
      background: #dcfce7;
      color: #15803d;
    }

    .badge-cancelada {
      background: #fee2e2;
      color: #b91c1c;
    }

    .acciones {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn-confirmar {
      background: #27ae60;
      color: white;
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-confirmar:hover {
      background: #229954;
      transform: translateY(-1px);
    }

    .btn-cancelar {
      background: #e74c3c;
      color: white;
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-cancelar:hover {
      background: #c0392b;
      transform: translateY(-1px);
    }

    .empty-message {
      text-align: center;
      padding: 3rem;
      color: #8aaec0;
      font-style: italic;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #1f4870;
    }

    .citas-footer {
      background: #f8fafd;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: #8aaec0;
      border-top: 1px solid #eef2f8;
    }

    @media screen and (max-width: 768px) {
      .citas-body { padding: 1rem; }
      .tabla-citas th, .tabla-citas td { padding: 0.6rem 0.5rem; font-size: 0.75rem; }
      .acciones { flex-direction: column; gap: 0.3rem; }
    }
  </style>
</head>
<body>
<div class="citas-container">
  <div class="citas-header">
    <h1>
      <i class="fas fa-calendar-check"></i> 
      Gestión de Citas - Administración
    </h1>
  </div>

  <div class="citas-body">
    <div class="header-actions">
      <h2 class="titulo-pagina">
        <i class="fas fa-list-ul"></i> 
        Todas las citas del sistema
      </h2>
    </div>

    <div class="stats-summary" id="stats-summary">
      <div class="stat-badge"><strong>0</strong> Total citas</div>
      <div class="stat-badge"><strong>0</strong> Pendientes</div>
      <div class="stat-badge"><strong>0</strong> Confirmadas</div>
      <div class="stat-badge"><strong>0</strong> Canceladas</div>
    </div>
    
    <div class="table-container">
      <table class="tabla-citas" id="tabla-citas">
        <thead>
          <tr>
            <th>ID</th>
            <th>Paciente</th>
            <th>Médico</th>
            <th>Especialidad</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Motivo</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="citas-tbody">
          <tr class="loading">
            <td colspan="9" style="text-align:center">Cargando citas... <i class="fas fa-spinner fa-spin"></i></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="citas-footer">
    <p><i class="fas fa-calendar-check"></i> Panel de administración - Gestión completa de citas</p>
  </div>
</div>

<script>
    const API_URL = 'https://api-citasmedicas-fwfrhzegbdd2c2bk.canadacentral-01.azurewebsites.net';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    // Verificar autenticación y rol
    if (!token) {
        alert('Debes iniciar sesión primero');
        window.location.href = '../../index.html';
    }
    
    if (user.role !== 'admin') {
        alert('Acceso denegado. Se requieren permisos de administrador.');
        window.location.href = '../../index.html';
    }
    
    // Cargar estadísticas
    async function cargarEstadisticas() {
        try {
            const response = await fetch(`${API_URL}/api/admin/estadisticas`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                document.getElementById('stats-summary').innerHTML = `
                    <div class="stat-badge"><strong>${data.total_citas || 0}</strong> Total citas</div>
                    <div class="stat-badge"><strong>${data.citas_pendientes || 0}</strong> Pendientes</div>
                    <div class="stat-badge"><strong>${data.citas_confirmadas || 0}</strong> Confirmadas</div>
                    <div class="stat-badge"><strong>${data.citas_canceladas || 0}</strong> Canceladas</div>
                `;
            }
        } catch (error) {
            console.error('Error cargando estadísticas:', error);
        }
    }
    
    // Cargar todas las citas
    async function cargarCitas() {
        try {
            const response = await fetch(`${API_URL}/api/admin/todas-citas`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.status === 403) {
                alert('No tienes permisos de administrador');
                window.location.href = '../../index.html';
                return;
            }
            
            if (response.ok) {
                const data = await response.json();
                const tbody = document.getElementById('citas-tbody');
                const citas = data.citas || [];
                
                if (citas.length === 0) {
                    tbody.innerHTML = '<tr class="empty-message"><td colspan="9">No hay citas registradas en el sistema</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                
                citas.forEach(cita => {
                    const fecha = new Date(cita.fecha);
                    const fechaStr = fecha.toISOString().split('T')[0];
                    const horaStr = cita.hora ? cita.hora.substring(0, 5) : '-';
                    
                    let estadoClass = '';
                    let estadoText = '';
                    
                    switch(cita.estado) {
                        case 'pendiente': 
                            estadoClass = 'badge-pendiente'; 
                            estadoText = '⏳ Pendiente'; 
                            break;
                        case 'confirmada': 
                            estadoClass = 'badge-confirmada'; 
                            estadoText = '✅ Confirmada'; 
                            break;
                        case 'cancelada': 
                            estadoClass = 'badge-cancelada'; 
                            estadoText = '❌ Cancelada'; 
                            break;
                        default: 
                            estadoClass = 'badge-pendiente'; 
                            estadoText = cita.estado;
                    }
                    
                    const medicoNombre = cita.medico_nombre ? `${cita.medico_nombre} ${cita.medico_apellido || ''}` : 'No asignado';
                    const especialidad = cita.especialidad || '-';
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${cita.id}</td>
                        <td>${cita.paciente_nombre || ''} ${cita.paciente_apellido || ''}<br><small style="color:#8aaec0">${cita.paciente_email}</small></td>
                        <td>${medicoNombre}</td>
                        <td>${especialidad}</td>
                        <td>${fechaStr}</td>
                        <td>${horaStr}</td>
                        <td>${cita.motivo ? cita.motivo.substring(0, 50) : '-'}</td>
                        <td><span class="badge-estado ${estadoClass}">${estadoText}</span></td>
                        <td class="acciones">
                            ${cita.estado === 'pendiente' ? `<button class="btn-confirmar" onclick="confirmarCita(${cita.id})"><i class="fas fa-check-circle"></i> Confirmar</button>` : ''}
                            ${cita.estado !== 'cancelada' ? `<button class="btn-cancelar" onclick="cancelarCita(${cita.id})"><i class="fas fa-times-circle"></i> Cancelar</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                const error = await response.json();
                console.error('Error:', error);
                document.getElementById('citas-tbody').innerHTML = `<tr class="empty-message"><td colspan="9">Error al cargar citas: ${error.error}</td></tr>`;
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('citas-tbody').innerHTML = '<tr class="empty-message"><td colspan="9">Error de conexión con el servidor</td></tr>';
        }
    }
    
    // Confirmar cita
    async function confirmarCita(citaId) {
        if (!confirm('¿Confirmar esta cita? El paciente recibirá notificación.')) return;
        
        try {
            const response = await fetch(`${API_URL}/api/admin/confirmar-cita/${citaId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
            
            if (response.ok) {
                alert('✅ Cita confirmada exitosamente');
                cargarCitas();
                cargarEstadisticas();
            } else {
                const data = await response.json();
                alert('❌ Error: ' + data.error);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('❌ Error al confirmar cita');
        }
    }
    
    // Cancelar cita (admin)
    async function cancelarCita(citaId) {
        if (!confirm('¿Cancelar esta cita? Esta acción no se puede deshacer.')) return;
        
        try {
            const response = await fetch(`${API_URL}/api/admin/cancelar-cita/${citaId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ motivo_cancelacion: 'Cancelada por administrador' })
            });
            
            if (response.ok) {
                alert('✅ Cita cancelada exitosamente');
                cargarCitas();
                cargarEstadisticas();
            } else {
                const data = await response.json();
                alert('❌ Error: ' + data.error);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('❌ Error al cancelar cita');
        }
    }
    
    // Cargar datos al iniciar
    cargarEstadisticas();
    cargarCitas();
</script>
</body>
</html>
