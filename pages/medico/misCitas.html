<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Citas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: white;
      padding: 1.5rem;
    }
    h2 {
      color: #1f4870;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: #f8fafd;
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .stat-card i { font-size: 1.5rem; color: #1f4870; }
    .stat-card h3 { font-size: 1.2rem; color: #1f4870; }
    .stat-card p { font-size: 0.7rem; color: #6c86a3; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #1f4870;
      color: white;
      padding: 12px;
      text-align: left;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #eef2f8;
    }
    tr:hover { background: #f8fafd; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-pendiente { background: #dbeafe; color: #1e40af; }
    .badge-confirmada { background: #dcfce7; color: #15803d; }
    .badge-completada { background: #fef3c7; color: #b45309; }
    .badge-cancelada { background: #fee2e2; color: #b91c1c; }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 500;
      margin-right: 5px;
    }
    .btn-confirmar { background: #27ae60; color: white; }
    .btn-confirmar:hover { background: #229954; }
    .btn-completar { background: #3498db; color: white; }
    .btn-completar:hover { background: #2980b9; }
    .btn-cancelar { background: #e74c3c; color: white; }
    .btn-cancelar:hover { background: #c0392b; }
    .empty { text-align: center; padding: 3rem; color: #8aaec0; }
    .loading { text-align: center; padding: 2rem; }
    @media (max-width: 768px) {
      body { padding: 1rem; }
      th, td { padding: 8px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <h2><i class="fas fa-calendar-alt"></i> Mis Citas Programadas</h2>
  
  <div class="stats" id="stats">
    <div class="stat-card"><i class="fas fa-clock"></i><div><h3 id="total">-</h3><p>Total</p></div></div>
    <div class="stat-card"><i class="fas fa-hourglass-half"></i><div><h3 id="pendientes">-</h3><p>Pendientes</p></div></div>
    <div class="stat-card"><i class="fas fa-check-circle"></i><div><h3 id="confirmadas">-</h3><p>Confirmadas</p></div></div>
    <div class="stat-card"><i class="fas fa-flag-checkered"></i><div><h3 id="completadas">-</h3><p>Completadas</p></div></div>
  </div>

  <div style="overflow-x: auto;">
    <table id="citasTable">
      <thead>
        <tr><th>ID</th><th>Paciente</th><th>Fecha</th><th>Hora</th><th>Motivo</th><th>Estado</th><th>Acciones</th></tr>
      </thead>
      <tbody id="citasBody">
        <tr class="loading"><td colspan="7">Cargando citas... <i class="fas fa-spinner fa-spin"></i></td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const API_URL = 'http://localhost:8080';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) window.location.href = '../../index.html';
    if (user.role !== 'medico') window.location.href = '../../index.html';

    async function cargarCitas() {
      try {
        const response = await fetch(`${API_URL}/api/medico/mis-citas`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          const data = await response.json();
          const citas = data.citas || [];
          mostrarCitas(citas);
          actualizarStats(citas);
        } else {
          document.getElementById('citasBody').innerHTML = '<tr><td colspan="7" class="empty">Error al cargar citas</td></tr>';
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('citasBody').innerHTML = '<tr><td colspan="7" class="empty">Error de conexión</td></tr>';
      }
    }

    function actualizarStats(citas) {
      document.getElementById('total').innerText = citas.length;
      document.getElementById('pendientes').innerText = citas.filter(c => c.estado === 'pendiente').length;
      document.getElementById('confirmadas').innerText = citas.filter(c => c.estado === 'confirmada').length;
      document.getElementById('completadas').innerText = citas.filter(c => c.estado === 'completada').length;
    }

    function mostrarCitas(citas) {
      const tbody = document.getElementById('citasBody');
      if (citas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">📋 No tienes citas asignadas</td></tr>';
        return;
      }
      tbody.innerHTML = '';
      citas.forEach(cita => {
        const fecha = new Date(cita.fecha).toISOString().split('T')[0];
        const horaStr = cita.hora ? cita.hora.substring(0,5) : '-';
        let estadoClass = '', estadoText = '', botones = '';
        switch(cita.estado) {
          case 'pendiente':
            estadoClass = 'badge-pendiente'; estadoText = 'Pendiente';
            botones = `<button class="btn-confirmar" onclick="actualizarEstado(${cita.id}, 'confirmada')"><i class="fas fa-check"></i> Confirmar</button>
                       <button class="btn-cancelar" onclick="actualizarEstado(${cita.id}, 'cancelada')"><i class="fas fa-times"></i> Cancelar</button>`;
            break;
          case 'confirmada':
            estadoClass = 'badge-confirmada'; estadoText = 'Confirmada';
            botones = `<button class="btn-completar" onclick="actualizarEstado(${cita.id}, 'completada')"><i class="fas fa-flag-checkered"></i> Completar</button>
                       <button class="btn-cancelar" onclick="actualizarEstado(${cita.id}, 'cancelada')"><i class="fas fa-times"></i> Cancelar</button>`;
            break;
          case 'completada':
            estadoClass = 'badge-completada'; estadoText = 'Completada';
            botones = '<span style="color:#27ae60;"><i class="fas fa-check-circle"></i> Finalizada</span>';
            break;
          case 'cancelada':
            estadoClass = 'badge-cancelada'; estadoText = 'Cancelada';
            botones = '<span style="color:#e74c3c;">Cancelada</span>';
            break;
        }
        const row = `<tr>
          <td>${cita.id}</td>
          <td><strong>${cita.nombre || ''} ${cita.apellido || ''}</strong><br><small>${cita.paciente_email}</small></td>
          <td>${fecha}</td><td>${horaStr}</td>
          <td>${cita.motivo ? cita.motivo.substring(0,50) : '-'}</td>
          <td><span class="badge ${estadoClass}">${estadoText}</span></td>
          <td>${botones}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    async function actualizarEstado(citaId, nuevoEstado) {
      let msg = '';
      if (nuevoEstado === 'confirmada') msg = '¿Confirmar esta cita?';
      else if (nuevoEstado === 'completada') msg = '¿Marcar como completada?';
      else msg = '¿Cancelar esta cita?';
      if (!confirm(msg)) return;
      try {
        const response = await fetch(`${API_URL}/api/medico/cita/${citaId}/estado`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ estado: nuevoEstado })
        });
        if (response.ok) {
          alert(`✅ Cita ${nuevoEstado}`);
          cargarCitas();
        } else {
          const error = await response.json();
          alert('❌ Error: ' + error.error);
        }
      } catch (error) {
        alert('❌ Error al actualizar');
      }
    }

    cargarCitas();
  </script>
</body>
</html>
