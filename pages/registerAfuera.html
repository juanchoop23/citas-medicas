<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Clínica Salud+ | Registro de Usuario</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f0fc 0%, #dbe6f2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .register-container {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .register-header {
      background: #1f4870;
      padding: 1.8rem 2rem;
      color: white;
      text-align: center;
    }

    .register-header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .register-header p {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 0.4rem;
    }

    .register-body {
      padding: 2rem 2rem 2.2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group.full-width {
      grid-column: span 2;
    }

    label {
      font-weight: 600;
      color: #1f4870;
      font-size: 0.85rem;
    }

    .input-icon {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon i {
      position: absolute;
      left: 1rem;
      color: #8aaec0;
      font-size: 1rem;
    }

    input, select {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      border: 1px solid #cbdde9;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      transition: 0.2s;
      background: #ffffff;
    }

    select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%238aaec0" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 1rem center;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #1f4870;
      box-shadow: 0 0 0 3px rgba(31, 72, 112, 0.15);
    }

    .terms {
      margin: 1.5rem 0 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .terms input {
      width: 1.1rem;
      height: 1.1rem;
      padding: 0;
      accent-color: #1f4870;
    }

    .terms label {
      font-weight: 500;
      font-size: 0.85rem;
      color: #2c4e6e;
    }

    .terms a {
      color: #1f4870;
      text-decoration: none;
      font-weight: 600;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    .register-btn {
      background: #27ae60;
      border: none;
      color: white;
      font-weight: 700;
      padding: 0.9rem;
      border-radius: 2rem;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .register-btn:hover {
      background: #229954;
      transform: translateY(-2px);
    }

    .login-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: #4a627a;
      border-top: 1px solid #e2edf2;
      padding-top: 1.5rem;
    }

    .login-prompt a {
      color: #1f4870;
      font-weight: 700;
      text-decoration: none;
      margin-left: 0.3rem;
    }

    .login-prompt a:hover {
      text-decoration: underline;
    }

    .mensaje {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 1rem;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }

    .mensaje.exito {
      background: #dcfce7;
      color: #15803d;
      display: block;
    }

    .mensaje.error {
      background: #fee2e2;
      color: #b91c1c;
      display: block;
    }

    @media (max-width: 650px) {
      .register-body { padding: 1.5rem; }
      .form-grid { grid-template-columns: 1fr; }
      .input-group.full-width { grid-column: span 1; }
    }
  </style>
</head>
<body>
<div class="register-container">
  <div class="register-header">
    <h1>
      <i class="fas fa-user-plus"></i> 
      Crear cuenta
    </h1>
    <p>Regístrate para gestionar tus citas médicas fácilmente</p>
  </div>

  <div class="register-body">
    <form id="registerForm">
      <div class="form-grid">
        <div class="input-group">
          <label><i class="fas fa-user"></i> Nombre</label>
          <div class="input-icon">
            <i class="fas fa-user"></i>
            <input type="text" id="nombre" placeholder="Nombre" required>
          </div>
        </div>

        <div class="input-group">
          <label><i class="fas fa-user"></i> Apellido</label>
          <div class="input-icon">
            <i class="fas fa-user"></i>
            <input type="text" id="apellido" placeholder="Apellido" required>
          </div>
        </div>

        <div class="input-group">
          <label><i class="fas fa-id-card"></i> Cédula</label>
          <div class="input-icon">
            <i class="fas fa-id-card"></i>
            <input type="text" id="cedula" placeholder="Número de cédula" required>
          </div>
        </div>

        <div class="input-group">
          <label><i class="fas fa-phone-alt"></i> Teléfono</label>
          <div class="input-icon">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" id="telefono" placeholder="Teléfono / Celular" required>
          </div>
        </div>

        <div class="input-group full-width">
          <label><i class="fas fa-envelope"></i> Correo electrónico</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
          </div>
        </div>

        <div class="input-group">
          <label><i class="fas fa-lock"></i> Contraseña</label>
          <div class="input-icon">
            <i class="fas fa-key"></i>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
          </div>
        </div>

        <div class="input-group">
          <label><i class="fas fa-check-circle"></i> Confirmar contraseña</label>
          <div class="input-icon">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
          </div>
        </div>
      </div>

      <div class="terms">
        <input type="checkbox" id="termsCheckbox" required>
        <label for="termsCheckbox">
          Acepto los <a href="#">Términos y condiciones</a> y la <a href="#">Política de privacidad</a>
        </label>
      </div>

      <button type="submit" class="register-btn">
        <i class="fas fa-user-check"></i> Registrarme
      </button>

      <div class="login-prompt">
        ¿Ya tienes una cuenta?
        <a href="../index.html">Inicia sesión aquí</a>
      </div>

      <div id="mensaje" class="mensaje"></div>
    </form>
  </div>
</div>

<script>
    const API_URL = 'https://api-citasmedicas-fwfrhzegbdd2c2bk.canadacentral-01.azurewebsites.net';
    
    function mostrarMensaje(texto, tipo) {
        const mensajeDiv = document.getElementById('mensaje');
        mensajeDiv.textContent = texto;
        mensajeDiv.className = `mensaje ${tipo}`;
        
        setTimeout(() => {
            if (mensajeDiv.className.includes('exito')) {
                mensajeDiv.style.display = 'none';
                setTimeout(() => {
                    mensajeDiv.style.display = '';
                }, 100);
            }
        }, 5000);
    }
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nombre = document.getElementById('nombre').value.trim();
        const apellido = document.getElementById('apellido').value.trim();
        const cedula = document.getElementById('cedula').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const termsAccepted = document.getElementById('termsCheckbox').checked;
        
        // Validaciones
        if (!nombre || !apellido || !cedula || !telefono || !email || !password) {
            mostrarMensaje('Por favor completa todos los campos', 'error');
            return;
        }
        
        if (password !== confirmPassword) {
            mostrarMensaje('Las contraseñas no coinciden', 'error');
            return;
        }
        
        if (password.length < 6) {
            mostrarMensaje('La contraseña debe tener al menos 6 caracteres', 'error');
            return;
        }
        
        if (!termsAccepted) {
            mostrarMensaje('Debes aceptar los términos y condiciones', 'error');
            return;
        }
        
        // Deshabilitar botón mientras se procesa
        const btn = document.querySelector('.register-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registrando...';
        
        try {
            const response = await fetch(`${API_URL}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    nombre,
                    apellido,
                    cedula,
                    telefono,
                    email, 
                    password,
                    role: 'paciente'
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                mostrarMensaje('✅ ¡Usuario registrado exitosamente! Redirigiendo al login...', 'exito');
                
                // Limpiar formulario
                document.getElementById('registerForm').reset();
                
                // Redirigir después de 2 segundos
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 2000);
            } else {
                mostrarMensaje(`❌ Error: ${data.error || 'No se pudo registrar el usuario'}`, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-check"></i> Registrarme';
            }
        } catch (error) {
            console.error('Error:', error);
            mostrarMensaje('❌ Error de conexión con el servidor. ¿El backend está corriendo?', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-check"></i> Registrarme';
        }
    });
</script>
</body>
</html>
