<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Clínica Salud+ | Registro de Usuario</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f0fc 0%, #dbe6f2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Tarjeta principal */
    .register-container {
      max-width: 580px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* Header */
    .register-header {
      background: #1f4870;
      padding: 1.8rem 2rem;
      color: white;
      text-align: center;
    }
    .register-header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .register-header p {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 0.4rem;
    }

    /* Cuerpo del formulario */
    .register-body {
      padding: 2rem 2rem 2.2rem;
    }

    /* Grid responsivo para campos */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group.full-width {
      grid-column: span 2;
    }

    label {
      font-weight: 600;
      color: #1f4870;
      font-size: 0.85rem;
      letter-spacing: -0.2px;
    }

    .input-icon {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon i {
      position: absolute;
      left: 1rem;
      color: #8aaec0;
      font-size: 1rem;
    }

    input, select {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      border: 1px solid #cbdde9;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      transition: 0.2s;
      background: #ffffff;
    }

    select {
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%238aaec0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 1rem center;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #1f4870;
      box-shadow: 0 0 0 3px rgba(31, 72, 112, 0.15);
    }

    /* Términos y condiciones */
    .terms {
      margin: 1.5rem 0 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .terms input {
      width: 1.1rem;
      height: 1.1rem;
      padding: 0;
      accent-color: #1f4870;
    }

    .terms label {
      font-weight: 500;
      font-size: 0.85rem;
      color: #2c4e6e;
    }

    .terms a {
      color: #1f4870;
      text-decoration: none;
      font-weight: 600;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    /* Botón registrar */
    .register-btn {
      background: #1f4870;
      border: none;
      color: white;
      font-weight: 700;
      padding: 0.9rem;
      border-radius: 2rem;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .register-btn:hover {
      background: #0f3554;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(31,72,112,0.2);
    }

    /* Enlace a inicio de sesión */
    .login-prompt {
      text-align: center;
      font-size: 0.9rem;
      color: #4a627a;
      border-top: 1px solid #e2edf2;
      padding-top: 1.5rem;
    }

    .login-prompt a {
      color: #1f4870;
      font-weight: 700;
      text-decoration: none;
      margin-left: 0.3rem;
    }

    .login-prompt a:hover {
      text-decoration: underline;
    }

    /* Demo visual (solo diseño, sin lógica) */
    .demo-note {
      background: #eef2ff;
      border-radius: 1rem;
      padding: 0.8rem;
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: #1e40af;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    /* Responsive */
    @media (max-width: 550px) {
      .register-body {
        padding: 1.5rem;
      }
      .register-header h1 {
        font-size: 1.5rem;
      }
      .form-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .input-group.full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
<div class="register-container">
  <div class="register-header">
    <h1>
      <i class="fas fa-pencil-alt"></i> 
      Mi Perfil
    </h1>
  </div>

  <div class="register-body">
    <!-- Formulario de registro (solo estructura visual) -->
    <form action="#" method="post">
      <div class="form-grid">
        <!-- Nombre completo -->
        <div class="input-group full-width">
          <label for="fullname"><i class="fas fa-user"></i> Nombre completo</label>
          <div class="input-icon">
            <i class="fas fa-user-circle"></i>
            <input type="text" id="fullname" name="fullname" placeholder="Ej: Ana María Pérez López" autocomplete="name">
          </div>
        </div>

        <!-- Correo electrónico -->
        <div class="input-group full-width">
          <label for="email"><i class="fas fa-envelope"></i> Correo electrónico</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" autocomplete="email">
          </div>
        </div>

        <!-- Teléfono -->
        <div class="input-group">
          <label for="phone"><i class="fas fa-phone-alt"></i> Teléfono / Celular</label>
          <div class="input-icon">
            <i class="fas fa-mobile-alt"></i>
            <input type="tel" id="phone" name="phone" placeholder="+57 300 123 4567" autocomplete="tel">
          </div>
        </div>

        <!-- Tipo de documento (select) -->
        <div class="input-group">
          <label for="docType"><i class="fas fa-id-card"></i> Tipo de documento</label>
          <div class="input-icon">
            <i class="fas fa-id-card"></i>
            <select id="docType" name="docType">
              <option value="cedula">Cédula de ciudadanía</option>
              <option value="ti">Tarjeta de identidad</option>
              <option value="pasaporte">Pasaporte</option>
              <option value="ce">Cédula extranjera</option>
            </select>
          </div>
        </div>

        <!-- Número de documento -->
        <div class="input-group">
          <label for="docNumber"><i class="fas fa-hashtag"></i> Número de documento</label>
          <div class="input-icon">
            <i class="fas fa-hashtag"></i>
            <input type="text" id="docNumber" name="docNumber" placeholder="Ej: 12345678">
          </div>
        </div>

        <!-- Fecha de nacimiento -->
        <div class="input-group">
          <label for="birthdate"><i class="fas fa-calendar-alt"></i> Fecha de nacimiento</label>
          <div class="input-icon">
            <i class="fas fa-calendar-alt"></i>
            <input type="date" id="birthdate" name="birthdate">
          </div>
        </div>
      </div> <!-- fin form-grid -->

        <br>
        <br>

      <a href="bienvenida.html" class="register-btn" onclick="alert('¡Datos modificados exitosamente!')">
        <i class="fas fa-user-check"></i> Actualizar
      </a>
    </form>
  </div>
</div>
</body>
</html>
