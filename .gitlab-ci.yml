# .gitlab-ci.yml - Solo para frontend (HTML/CSS/JS)
image: alpine:latest

stages:
  - deploy

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp -r *.html pages/ public/ 2>/dev/null || true
    - cp -r assets css js public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  only:
    - main